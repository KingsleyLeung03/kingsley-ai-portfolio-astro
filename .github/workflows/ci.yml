name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install & Build
        uses: withastro/action@v6
        with:
          package-manager: bun@latest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
